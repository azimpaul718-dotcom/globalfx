<!DOCTYPE html>
<html>
<head><title>Completing login...</title></head>
<body>
<script>
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  if (token) {
    window.opener.postMessage({ type: 'deriv_token', token }, window.location.origin);
    window.close();
  } else {
    document.body.textContent = 'Login failed.';
  }
</script>
</body>
</html>
